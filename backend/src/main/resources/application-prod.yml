spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 60000
      max-lifetime: 300000
      keepalive-time: 30000
      validation-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: false
  security:
    user:
      name: disabled
      password: disabled

sendgrid:
  api-key: ${SENDGRID_API_KEY:}
  from-email: ${SENDGRID_FROM_EMAIL:noreply@sidbi.in}
  from-name: ${SENDGRID_FROM_NAME:SIDBI VDF Portal}

server:
  port: ${PORT:8080}
  error:
    include-message: always
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

vdf:
  app:
    base-url: ${VDF_APP_BASE_URL}
  files:
    storage-path: ${VDF_FILES_STORAGE_PATH:./data/vdf-uploads}
  jwt:
    secret: ${VDF_JWT_SECRET}
    issuer: vdf-backend
    access-token-validity-minutes: ${VDF_JWT_ACCESS_VALIDITY:60}
  cors:
    allowed-origins: ${VDF_CORS_ORIGINS}

logging:
  level:
    root: INFO
    com.sidbi.vdf: INFO
