services:
  - type: web
    name: vdf-backend
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: VDF_JWT_SECRET
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: VDF_APP_BASE_URL
        value: https://sidbi-venture.vercel.app
      - key: VDF_CORS_ORIGINS
        value: https://sidbi-venture.vercel.app
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080
